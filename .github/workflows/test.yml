name: Lint & Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest" 

      - name: Install dependencies
        run: uv sync

      - name: Ensure assets/models directory exists
        run: mkdir -p assets/models

      - name: Lint with flake8
        run: |
          uv run flake8 src tests --count --select=E9,F63,F7,F82 --show-source --statistics
          uv run flake8 src tests --count --exit-zero --max-complexity=10 --statistics

      - name: Check formatting with black
        run: uv run black --check src tests

      - name: Check import order with isort
        run: uv run isort --check-only src tests

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxcb-cursor0 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 xvfb tesseract-ocr tesseract-ocr-eng

      - name: Download spaCy model
        run: |
          uv run python - <<'PY'
          import urllib.request
          import zipfile
          from pathlib import Path

          model_dir = Path('assets/models')
          model_dir.mkdir(parents=True, exist_ok=True)

          url = 'https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.8.0/en_core_web_sm-3.8.0-py3-none-any.whl'
          wheel_path = model_dir / 'en_core_web_sm-3.8.0-py3-none-any.whl'

          print('Downloading spaCy model...')
          urllib.request.urlretrieve(url, wheel_path)

          print('Extracting...')
          with zipfile.ZipFile(wheel_path, 'r') as z:
            z.extractall(model_dir)

          versioned = model_dir / 'en_core_web_sm' / 'en_core_web_sm-3.8.0'
          if versioned.exists():
            import shutil
            for item in versioned.iterdir():
              dest = model_dir / 'en_core_web_sm' / item.name
              if dest.exists():
                if dest.is_dir():
                  shutil.rmtree(dest)
                else:
                  dest.unlink()
              shutil.move(str(item), str(dest))
            versioned.rmdir()

          print('Model ready at assets/models/en_core_web_sm')
          PY

      - name: Download object detection models
        run: |
          uv run python - <<'PY'
          import urllib.request
          from pathlib import Path

          model_dir = Path('assets/models')
          model_dir.mkdir(parents=True, exist_ok=True)

          downloads = {
              'yolov8n-face.pt': 'https://github.com/akanametov/yolo-face/releases/download/1.0.0/yolov8n-face.pt',
              'license-plate-finetune-v1n.pt': 'https://huggingface.co/morsetechlab/yolov11-license-plate-detection/resolve/main/license-plate-finetune-v1n.pt',
          }

          for filename, url in downloads.items():
              target = model_dir / filename
              if not target.exists():
                  print(f'Downloading {filename}...')
                  urllib.request.urlretrieve(url, target)
              print(f'{filename}: {target}')
          PY

      - name: Run tests with pytest
        run: xvfb-run uv run pytest tests --cov=src --cov-report=term --cov-report=xml
        
      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false