name: Lint & Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest" 

      - name: Install dependencies
        run: uv sync

      - name: Lint with flake8
        run: |
          uv run flake8 src tests --count --select=E9,F63,F7,F82 --show-source --statistics
          uv run flake8 src tests --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Check formatting with black
        run: uv run black --check src tests

      - name: Check import order with isort
        run: uv run isort --check-only src tests

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxcb-cursor0 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 xvfb tesseract-ocr tesseract-ocr-eng

      - name: Run tests with pytest
        run: xvfb-run uv run pytest tests --cov=src --cov-report=term --cov-report=xml
        
      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false