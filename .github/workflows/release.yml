name: Build Release Bundle

on:
  push:
    tags:
      - 'v*'  # Triggers on tags like v0.1.0, v1.0.0, etc.

permissions:
  contents: write

jobs:
  build:
    name: Build PyInstaller Bundle
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.14']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Install dependencies
        run: uv sync

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Download spaCy model
        run: |
          uv run python -c "import urllib.request; import zipfile; from pathlib import Path; import shutil; model_dir = Path('assets/models'); model_dir.mkdir(parents=True, exist_ok=True); wheel_path = model_dir / 'en_core_web_sm-3.8.0-py3-none-any.whl'; urllib.request.urlretrieve('https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.8.0/en_core_web_sm-3.8.0-py3-none-any.whl', wheel_path); z = zipfile.ZipFile(wheel_path, 'r'); z.extractall(model_dir); z.close(); versioned = model_dir / 'en_core_web_sm' / 'en_core_web_sm-3.8.0'; shutil.move(str(versioned), str(model_dir / 'en_core_web_sm_tmp')) if versioned.exists() else None; shutil.rmtree(model_dir / 'en_core_web_sm') if (model_dir / 'en_core_web_sm').exists() else None; shutil.move(str(model_dir / 'en_core_web_sm_tmp'), str(model_dir / 'en_core_web_sm')) if (model_dir / 'en_core_web_sm_tmp').exists() else None"

      - name: Download object detection models
        run: |
          uv run python - <<'PY'
          from src.ai.object_detector import download_default_models

          downloaded = download_default_models()
          for name, path in downloaded.items():
            print(f'{name}: {path}')
          PY

      - name: Build with PyInstaller
        run: uv run pyinstaller --onedir --name redactai --windowed --add-data "src/ui/styles:src/ui/styles" --add-data "assets/models:assets/models" src/main.py

      - name: Create archive (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd dist
          tar -czf redactai-${{ runner.os }}-${{ github.ref_name }}.tar.gz redactai/
          cd ..

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        run: |
          cd dist
          powershell -Command "Compress-Archive -Path redactai -DestinationPath redactai-Windows-${{ github.ref_name }}.zip"
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: redactai-${{ runner.os }}-${{ github.ref_name }}
          path: dist/redactai-*

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: redactai-*/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}