name: Build Release Bundle

on:
  push:
    tags:
      - 'v*'  # Triggers on tags like v0.1.0, v1.0.0, etc.

jobs:
  build:
    name: Build PyInstaller Bundle
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.14']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Install dependencies
        run: uv sync

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build with PyInstaller
        run: uv run pyinstaller --onedir --name redactai --windowed src/main.py

      - name: Create archive (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd dist
          tar -czf redactai-${{ runner.os }}-${{ github.ref_name }}.tar.gz redactai/
          cd ..

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        run: |
          cd dist
          powershell -Command "Compress-Archive -Path redactai -DestinationPath redactai-Windows-${{ github.ref_name }}.zip"
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: redactai-${{ runner.os }}-${{ github.ref_name }}
          path: dist/redactai-*

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v3

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: redactai-*/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}